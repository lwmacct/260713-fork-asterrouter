name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: asterrouter_test
          POSTGRES_USER: asterrouter
          POSTGRES_PASSWORD: asterrouter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U asterrouter -d asterrouter_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      ASTER_TEST_DATABASE_URL: postgres://asterrouter:asterrouter@127.0.0.1:5432/asterrouter_test?sslmode=disable
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Check formatting
        working-directory: backend
        run: test -z "$(gofmt -l .)"
      - name: Vet
        working-directory: backend
        run: go vet ./...
      - name: Tests with PostgreSQL and coverage
        working-directory: backend
        run: go test -covermode=atomic -coverprofile=coverage.out ./...
      - name: Plugin trust-chain journey
        working-directory: backend
        run: |
          set -o pipefail
          go test -json -count=1 -timeout=60s ./internal/plugins \
            -run '^(TestPluginTrustChainCatalogToSidecarFeed|TestServiceSyncOfficialCatalogRejectsTamperedPayload|TestServiceDownloadOfficialPackageRejectsChecksumMismatch|TestOfficialFeedImportRejectsTamperedCiphertextAndRollback|TestOfficialFeedImportAppliesRevocationsAndFallsBackToUsableCache|TestServiceSyncOfficialCatalogBlocksRevokedAdvisoryVersion|TestInstallPackageRollsBackActiveDirectoryWhenRepositoryWriteFails)$' \
            | tee "${{ runner.temp }}/plugin-trust-chain.json"
      - name: Gateway failure matrix
        env:
          ASTER_GATEWAY_FAILURE_MATRIX_OUTPUT: ${{ runner.temp }}/gateway-failure-matrix.json
        run: node scripts/gateway-failure-matrix.mjs
      - name: Upload backend coverage
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage.out
          if-no-files-found: error
      - name: Upload plugin trust-chain evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: plugin-trust-chain-evidence
          path: ${{ runner.temp }}/plugin-trust-chain.json
          if-no-files-found: error
      - name: Upload gateway failure matrix
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gateway-failure-matrix
          path: ${{ runner.temp }}/gateway-failure-matrix.json
          if-no-files-found: error

  recovery:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: asterrouter_recovery_test
          POSTGRES_USER: asterrouter
          POSTGRES_PASSWORD: asterrouter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U asterrouter -d asterrouter_recovery_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: PostgreSQL backup and empty-database restore rehearsal
        working-directory: backend
        env:
          ASTER_RECOVERY_TEST_DATABASE_URL: postgres://asterrouter:asterrouter@127.0.0.1:5432/asterrouter_recovery_test?sslmode=disable
          ASTER_RECOVERY_TEST_ALLOW_DESTRUCTIVE: '1'
        run: |
          set -o pipefail
          go test -json -count=1 -run '^TestPostgresBackupRestoreRehearsal$' ./internal/system | tee "${{ runner.temp }}/recovery-test.json"
      - name: Upgrade v0.3.0 schema fixture with candidate runtime
        working-directory: backend
        env:
          ASTER_TEST_DATABASE_URL: postgres://asterrouter:asterrouter@127.0.0.1:5432/asterrouter_recovery_test?sslmode=disable
        run: |
          set -o pipefail
          go test -json -count=1 -run '^TestV030LegacySchemaUpgradesWithCandidateRuntime$' ./migrations | tee "${{ runner.temp }}/migration-upgrade-test.json"
      - name: Upload recovery evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: postgres-recovery-evidence
          path: |
            ${{ runner.temp }}/recovery-test.json
            ${{ runner.temp }}/migration-upgrade-test.json
          if-no-files-found: error

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Check public documentation links
        working-directory: frontend
        run: npm run check:public-doc-links
      - name: Check workflow pipeline failure propagation
        working-directory: frontend
        run: npm run check:workflow-pipefail
      - name: Check Enterprise surface
        working-directory: frontend
        run: npm run check:enterprise-surface
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Unit and component tests
        working-directory: frontend
        run: npm run test:unit:coverage
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: error

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: asterrouter_e2e_test
          POSTGRES_USER: asterrouter
          POSTGRES_PASSWORD: asterrouter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U asterrouter -d asterrouter_e2e_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      ASTERROUTER_SERVER_STORAGE_DATABASE_URL: postgres://asterrouter:asterrouter@127.0.0.1:5432/asterrouter_e2e_test?sslmode=disable
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Browser smoke tests
        working-directory: frontend
        run: npm run test:e2e:smoke
      - name: Create isolated first-install database
        env:
          PGPASSWORD: asterrouter
        run: >-
          psql --host=127.0.0.1 --username=asterrouter --dbname=postgres
          --command='CREATE DATABASE asterrouter_e2e_setup_test'
      - name: First-install setup browser journey
        env:
          ASTER_SETUP_JOURNEY_DIR: ${{ runner.temp }}/asterrouter-setup-journey
          ASTER_SETUP_JOURNEY_DATABASE_URL: postgres://asterrouter:asterrouter@127.0.0.1:5432/asterrouter_e2e_setup_test?sslmode=disable
        run: bash scripts/test-setup-browser-journey.sh
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-evidence
          path: |
            frontend/playwright-report
            frontend/test-results
            ${{ runner.temp }}/asterrouter-setup-journey/report.txt
            ${{ runner.temp }}/asterrouter-setup-journey/runtime.log
            ${{ runner.temp }}/asterrouter-setup-journey/playwright
          if-no-files-found: ignore

  container-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run release container acceptance
        env:
          ASTER_TEST_ARTIFACT_DIR: ${{ runner.temp }}/asterrouter-container-evidence
        run: bash scripts/test-container.sh
      - name: Upload container evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: container-evidence
          path: ${{ runner.temp }}/asterrouter-container-evidence
          if-no-files-found: ignore
