name: Security Scan

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Scan repository history for secrets
        run: >-
          docker run --rm
          -v "$PWD:/repo"
          zricethezav/gitleaks:v8.24.2
          detect --source=/repo --redact --verbose --log-opts=--all --config=/repo/.gitleaks.toml

  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - uses: github/codeql-action/init@v4
        with:
          languages: go,javascript-typescript

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Build backend
        working-directory: backend
        run: go build -trimpath ./cmd/asterrouter

      - uses: github/codeql-action/analyze@v4

  dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: golang/govulncheck-action@v1.1.0
        with:
          repo-checkout: false
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
          go-package: ./...
          work-dir: backend
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Audit frontend production dependencies
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t asterrouter:security .
      - name: Scan image
        run: >-
          docker run --rm
          -v /var/run/docker.sock:/var/run/docker.sock
          -v "$PWD:/work"
          aquasec/trivy:0.65.0
          image
          --format sarif
          --output /work/trivy-results.sarif
          --severity HIGH,CRITICAL
          --ignore-unfixed
          --exit-code 1
          asterrouter:security
      - name: Upload scan report
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
