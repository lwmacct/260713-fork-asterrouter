name: Build Artifacts

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional build version override, for example 0.1.0'
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: asterrouter_release_test
          POSTGRES_USER: asterrouter
          POSTGRES_PASSWORD: asterrouter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U asterrouter -d asterrouter_release_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(tr -d '\r\n' < backend/cmd/asterrouter/VERSION)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build release assets
        run: bash scripts/build-release.sh "${{ steps.version.outputs.version }}"

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Validate release assets
        env:
          ASTER_TEST_ARM64_RUNTIME: '1'
        run: bash scripts/test-release-artifacts.sh "${{ steps.version.outputs.version }}"

      - name: Validate candidate release runtime
        env:
          ASTER_RELEASE_RUNTIME_DIR: ${{ runner.temp }}/asterrouter-release-runtime
          ASTER_RELEASE_TEST_DATABASE_URL: postgres://asterrouter:asterrouter@127.0.0.1:5432/asterrouter_release_test?sslmode=disable
        run: bash scripts/test-release-runtime.sh "${{ steps.version.outputs.version }}"

      - name: Validate Linux install, upgrade, and rollback
        env:
          ASTER_INSTALLER_TEST_DIR: ${{ runner.temp }}/asterrouter-installer-test
        run: sudo --preserve-env=ASTER_INSTALLER_TEST_DIR bash scripts/test-installer.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: asterrouter-${{ steps.version.outputs.version }}-linux
          path: |
            dist/asterrouter_*_linux_amd64
            dist/asterrouter_*_linux_arm64
            dist/asterrouter_*_linux_amd64.tar.gz
            dist/asterrouter_*_linux_arm64.tar.gz
            dist/checksums.txt
            dist/asterrouter_update_manifest.json
          if-no-files-found: error
      - name: Upload installer evidence
        uses: actions/upload-artifact@v7
        with:
          name: asterrouter-installer-evidence
          path: ${{ runner.temp }}/asterrouter-installer-test/report.txt
          if-no-files-found: error
      - name: Upload release runtime evidence
        uses: actions/upload-artifact@v7
        with:
          name: asterrouter-release-runtime-evidence
          path: |
            ${{ runner.temp }}/asterrouter-release-runtime/report.txt
            ${{ runner.temp }}/asterrouter-release-runtime/runtime.log
            ${{ runner.temp }}/asterrouter-release-runtime/fail-closed.log
          if-no-files-found: error
