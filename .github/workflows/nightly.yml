name: Nightly Tests

on:
  schedule:
    - cron: '17 18 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-race-and-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Race detector
        working-directory: backend
        run: go test -race -count=1 -timeout=15m ./...
      - name: Gateway benchmarks
        env:
          ASTER_TEST_ARTIFACT_DIR: ${{ runner.temp }}/asterrouter-test-artifacts
        run: bash scripts/benchmark.sh
      - name: Gateway normal and streaming soak
        working-directory: backend
        env:
          ASTER_GATEWAY_SOAK: '1'
          ASTER_GATEWAY_SOAK_DURATION: 30m
        run: go test -count=1 -timeout=35m -run '^TestGatewayNormalAndStreamingSoak$' -v ./internal/server | tee ${{ runner.temp }}/asterrouter-test-artifacts/gateway-soak.txt
      - name: Upload benchmark evidence
        uses: actions/upload-artifact@v7
        with:
          name: gateway-benchmark
          path: ${{ runner.temp }}/asterrouter-test-artifacts/gateway-benchmark.txt
          if-no-files-found: error
      - name: Upload soak evidence
        uses: actions/upload-artifact@v7
        with:
          name: gateway-soak
          path: ${{ runner.temp }}/asterrouter-test-artifacts/gateway-soak.txt
          if-no-files-found: error

  full-browser-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Full browser suite
        working-directory: frontend
        env:
          ASTER_E2E_ALL_BROWSERS: '1'
          ASTER_E2E_RETRIES: '1'
        run: npm run test:e2e
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-playwright-evidence
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
