name: Nightly Tests

on:
  schedule:
    - cron: '17 18 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  backend-race-and-benchmark:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Race detector
        working-directory: backend
        run: |
          set -o pipefail
          mkdir -p "${{ runner.temp }}/asterrouter-test-artifacts"
          go test -race -json -count=1 -timeout=15m ./... | tee "${{ runner.temp }}/asterrouter-test-artifacts/backend-race.json"
      - name: Gateway benchmarks
        env:
          ASTER_TEST_ARTIFACT_DIR: ${{ runner.temp }}/asterrouter-test-artifacts
          ASTER_BENCHMARK_ENFORCE: '1'
        run: bash scripts/benchmark.sh
      - name: Gateway normal and streaming soak
        working-directory: backend
        env:
          ASTER_GATEWAY_SOAK: '1'
          ASTER_GATEWAY_SOAK_DURATION: 30m
        run: |
          set -o pipefail
          go test -count=1 -timeout=35m -run '^TestGatewayNormalAndStreamingSoak$' -v ./internal/server | tee "${{ runner.temp }}/asterrouter-test-artifacts/gateway-soak.txt"
      - name: Upload benchmark evidence
        uses: actions/upload-artifact@v7
        with:
          name: gateway-benchmark
          path: |
            ${{ runner.temp }}/asterrouter-test-artifacts/gateway-benchmark.txt
            ${{ runner.temp }}/asterrouter-test-artifacts/gateway-benchmark.json
          if-no-files-found: error
      - name: Upload soak evidence
        uses: actions/upload-artifact@v7
        with:
          name: gateway-soak
          path: ${{ runner.temp }}/asterrouter-test-artifacts/gateway-soak.txt
          if-no-files-found: error
      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-backend-test-results
          path: ${{ runner.temp }}/asterrouter-test-artifacts/backend-race.json
          if-no-files-found: ignore

  full-browser-matrix:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: asterrouter_nightly_e2e
          POSTGRES_USER: asterrouter
          POSTGRES_PASSWORD: asterrouter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U asterrouter -d asterrouter_nightly_e2e"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      ASTERROUTER_SERVER_STORAGE_DATABASE_URL: postgres://asterrouter:asterrouter@127.0.0.1:5432/asterrouter_nightly_e2e?sslmode=disable
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Frontend unit and component tests
        working-directory: frontend
        run: npx vitest run --reporter=default --reporter=junit --outputFile.junit=test-results/vitest-junit.xml
      - name: Full browser suite
        working-directory: frontend
        env:
          ASTER_E2E_ALL_BROWSERS: '1'
          ASTER_E2E_RETRIES: '0'
        run: npm run test:e2e
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-playwright-evidence
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

      - name: Upload frontend test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-frontend-test-results
          path: frontend/test-results
          if-no-files-found: ignore

  test-health:
    needs:
      - backend-race-and-benchmark
      - full-browser-matrix
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Download current test results
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          path: ${{ runner.temp }}/current-test-results
          pattern: nightly-*-test-results
          merge-multiple: false
      - name: Ensure test-result input exists
        run: |
          mkdir -p "${{ runner.temp }}/current-test-results"
          : > "${{ runner.temp }}/current-test-results/empty-go.json"
      - name: Download previous nightly test-health reports
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/collect-flaky-history.sh "${{ runner.temp }}/flaky-history"
      - name: Generate flaky trend report
        run: >-
          node scripts/flaky-trend.mjs
          --input "${{ runner.temp }}/current-test-results"
          --history "${{ runner.temp }}/flaky-history"
          --output "${{ runner.temp }}/test-health-report/flaky-trend.json"
      - name: Upload test-health report
        uses: actions/upload-artifact@v7
        with:
          name: test-health-report
          path: ${{ runner.temp }}/test-health-report/flaky-trend.json
          if-no-files-found: error
