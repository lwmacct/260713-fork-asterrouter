services:
  asterrouter:
    build: .
    environment:
      ASTERROUTER_SERVER_HTTP_LISTEN: ":8080"
      ASTERROUTER_SERVER_SECURITY_ADMIN_USERNAME: "admin"
      ASTERROUTER_SERVER_SECURITY_ADMIN_PASSWORD: "change-me"
      ASTERROUTER_SERVER_BOOTSTRAP_DEMO_MODE: "${ASTERROUTER_SERVER_BOOTSTRAP_DEMO_MODE:-false}"
      # Leave the deployment role unset for interactive first-run selection at /setup.
      # For unattended installation, set ASTERROUTER_SERVER_BOOTSTRAP_DEPLOYMENT_ROLE to personal,
      # relay_operator, enterprise, or platform. The role is immutable after first boot.
      ASTERROUTER_SERVER_SECURITY_SECRET_KEY: "replace-with-a-stable-random-secret"
      ASTERROUTER_SERVER_STORAGE_DATABASE_URL: "postgres://asterrouter:asterrouter@postgres:5432/asterrouter?sslmode=disable"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: asterrouter
      POSTGRES_USER: asterrouter
      POSTGRES_PASSWORD: asterrouter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asterrouter -d asterrouter"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
